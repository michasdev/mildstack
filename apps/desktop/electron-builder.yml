appId: com.michasdev.mildstack-desktop
productName: MildStack Desktop
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: mildstack-desktop
  target:
    - target: nsis
      arch:
        - x64
        - arm64
nsis:
  artifactName: ${name}-${version}-windows-${arch}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Force ad-hoc signing so app binary and bundled frameworks share a consistent signature
  # when no Apple Developer ID is available.
  identity: "-"
  forceCodeSigning: false
  hardenedRuntime: false
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  artifactName: ${name}-${version}-mac-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}-mac-${arch}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
  maintainer: electronjs.org
  category: Utility
deb:
  artifactName: ${name}-${version}-linux-${arch}.${ext}
appImage:
  artifactName: ${name}-${version}-linux-${arch}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: michasdev
  repo: mildstack
  releaseType: release
extraResources:
  - from: "resources/bin/${os}-${arch}"
    to: "bin"
    filter:
      - "**/*"
